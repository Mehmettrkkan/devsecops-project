name: 3 - Container Scan & SBOM

on:
  push:
    branches: [ "main", "feature/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  container-security:
    name: Build, Scan & SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image locally
        # Imajı uzak sunucuya yollamadan önce runner içinde build ediyoruz
        run: docker build -t devsecops-app:latest .

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'devsecops-app:latest'
          format: 'table'
          # CRITICAL veya HIGH seviye açık varsa pipeline'ı durdur (Exit Code 1)
          exit-code: '1' 
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Generate SBOM with Syft
        # Uygulamanın tam envanterini (SBOM) çıkarıyoruz
        uses: anchore/sbom-action@v0
        with:
          image: 'devsecops-app:latest'
          format: 'spdx-json'
          output-file: 'sbom.json'

      - name: Upload SBOM Artifact
        # Çıkan raporu GitHub Actions sekmesinden indirilebilir hale getiriyoruz
        uses: actions/upload-artifact@v4
        with:
          name: SBOM-Report
          path: sbom.json
